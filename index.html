<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>學生講義</title>
  <style>
    :root {
      --bg: #f7efe3;
      --surface: rgba(255, 251, 246, 0.88);
      --ink: #1f2f39;
      --muted: #60707a;
      --teal: #0f7b76;
      --amber: #df8f36;
      --berry: #893654;
      --shadow: 0 18px 54px rgba(17, 48, 66, 0.12);
      --radius-xl: 30px;
      --radius-lg: 22px;
    }

    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(223, 143, 54, 0.22), transparent 24rem),
        radial-gradient(circle at top right, rgba(15, 123, 118, 0.18), transparent 24rem),
        linear-gradient(180deg, #f7f1e6 0%, #fff9f2 48%, #f1ebe1 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: min(520px, 100%);
      text-align: center;
    }

    .hero {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.92), rgba(255, 249, 240, 0.82)),
        linear-gradient(135deg, rgba(223, 143, 54, 0.14), rgba(15, 123, 118, 0.12));
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
      backdrop-filter: blur(12px);
      padding: 36px 28px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(31, 47, 57, 0.07);
      font-weight: 800;
      font-size: 0.9rem;
    }

    .eyebrow::before {
      content: "";
      width: 10px; height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--amber), var(--berry));
    }

    h1 {
      margin: 16px 0 8px;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      margin-bottom: 28px;
    }

    .cards {
      display: grid;
      gap: 14px;
      margin-top: 24px;
    }

    .card {
      display: block;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.88);
      box-shadow: 0 8px 32px rgba(17, 48, 66, 0.08);
      border-radius: var(--radius-lg);
      padding: 22px 24px;
      text-decoration: none;
      color: var(--ink);
      transition: transform 0.15s, box-shadow 0.15s;
      text-align: left;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(17, 48, 66, 0.14);
    }

    .card-title {
      font-size: 1.1rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .card-desc {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .card-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px; height: 40px;
      border-radius: 12px;
      font-size: 1.3rem;
      margin-bottom: 10px;
    }

    .card:nth-child(1) .card-icon { background: rgba(15, 123, 118, 0.12); }
    .card:nth-child(2) .card-icon { background: rgba(137, 54, 84, 0.12); }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <span class="eyebrow">安和國中</span>
      <h1>學生講義</h1>
      <p class="subtitle">選擇你要看的講義</p>

      <div class="cards">
        <a class="card" href="obsidian-guide.html">
          <div class="card-icon">O</div>
          <div class="card-title">Obsidian 入門講義</div>
          <div class="card-desc">用 Obsidian 打造你的學習筆記本，從國一用到國三。</div>
        </a>
        <a class="card" href="claude-code-guide.html">
          <div class="card-icon">C</div>
          <div class="card-title">Claude Code 安裝講義</div>
          <div class="card-desc">照著做，25 分鐘裝好，讓 AI 陪你練程式。</div>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
